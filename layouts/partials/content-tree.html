{{ $section := .section }}
{{ $depth := .depth }}
{{ range $section.Sections }}
<details {{ if lt $depth 2 }}open{{ end }}>
  <summary>{{ .Title }}</summary>
  <div class="tree-children">
    {{ partial "content-tree.html" (dict "section" . "depth" (add $depth 1)) }}
  </div>
</details>
{{ end }}
{{ range $section.RegularPages }}
<div class="tree-leaf"><a href="{{ .Permalink }}">{{ .Title }}</a></div>
{{ end }}
