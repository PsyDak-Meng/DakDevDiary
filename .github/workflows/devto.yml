name: Publish to Dev.to

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'content/posts/**/*.md'
      - 'scripts/preprocess_devto.py'

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Preprocess posts for Dev.to
        run: python scripts/preprocess_devto.py

      - name: Publish to Dev.to
        uses: sinedied/publish-devto@v2
        with:
          devto_key: ${{ secrets.DEVTO_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          files: '_devto/**/*.md'
          branch: main
          conventional_commits: false
